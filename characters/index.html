function card(m){return `<div class="card" data-n="${(m.name||'').toLowerCase()}">
  <div class="thumb"><img loading="lazy" src="${m.thumb||''}" alt=""></div>
  <div class="meta"><div class="nm">${m.name||m.uid}</div><div class="au">${m.author||''} · ${m.license||''}</div>
  <a href="${m.url||'#'}" target="_blank">Sketchfab ↗</a></div></div>`;}
function paint(el,arr){el.innerHTML=arr.map(card).join('');}
paint(document.getElementById('ncGrid'),OPEN);
document.getElementById('ncCnt').textContent=OPEN.length+' 個';
let CM=[];
document.getElementById('q').oninput=e=>{const q=e.target.value.toLowerCase();
  document.querySelectorAll('.card').forEach(c=>c.style.display=c.dataset.n.includes(q)?'':'none');};
async function unlock(pw){
  const raw=Uint8Array.from(atob(BLOB),c=>c.charCodeAt(0));
  const salt=raw.slice(0,16),iv=raw.slice(16,28),ct=raw.slice(28);
  const base=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),{name:"PBKDF2"},false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:ITER,hash:"SHA-256"},base,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,ct);
  return JSON.parse(new TextDecoder().decode(pt));
}
document.getElementById('go').onclick=async()=>{
  const pw=document.getElementById('pw').value,err=document.getElementById('err');
  err.textContent="解密中…";
  try{CM=await unlock(pw);document.getElementById('lock').style.display='none';
    const g=document.getElementById('cmGrid');g.style.display='grid';paint(g,CM);
    document.getElementById('cmCnt').textContent=CM.length+' 個';
    sessionStorage.setItem('pw',pw);
  }catch(e){err.textContent="❌ 密碼錯誤";}
};
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('go').click();});
const saved=sessionStorage.getItem('pw');if(saved){document.getElementById('pw').value=saved;document.getElementById('go').click();}
